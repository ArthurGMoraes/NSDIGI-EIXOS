<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css">
  <title>PROTÓTIPO</title>
</head>
<body>

<header>
  <div>
    <h1>Painel de Acompanhamento de OKRs</h1>
    <p>Microrregião BH · Nova Lima · Santa Luzia &nbsp;·&nbsp; 2026</p>
  </div>
  <div class="header-stats">
    <div class="stat"><div class="val" id="s-prog" style="color:var(--E2)">—</div><div class="lbl">Progresso</div></div>
    <div class="stat"><div class="val" id="s-ok"   style="color:var(--ok)">—</div><div class="lbl">Concluídas</div></div>
    <div class="stat"><div class="val" id="s-wa"   style="color:var(--warn)">—</div><div class="lbl">Em Andamento</div></div>
    <div class="stat"><div class="val" id="s-err"  style="color:var(--danger)">—</div><div class="lbl">Atrasadas</div></div>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div id="loading" class="loading"><div class="spinner"></div>Carregando…</div>
    <div id="eixos-grid" style="display:none; flex-direction:column; gap:10px;"></div>
    <button class="btn-add-eixo" id="btn-add-eixo" style="display:none" onclick="openModal('eixo')">+ Novo Eixo</button>
  </aside>
  <section class="content">
    <div id="detail">
      <div class="empty-state">
        <span class="arrow">←</span>
        <span>Selecione um eixo para ver as atividades</span>
      </div>
    </div>
  </section>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span id="modal-title">Novo item</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Confirm -->
<div id="confirm-overlay" class="modal-overlay" onclick="closeConfirm()">
  <div class="modal confirm-modal" onclick="event.stopPropagation()">
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger" id="confirm-ok">Excluir</button>
    </div>
  </div>
</div>

<div id="toast"></div>

</body>
</html>
